<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordsearch Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Language Wordsearch</h1>
        <div class="input-section">
            <p>Select the language for the grid and the language for the word list, then find the word list language words in the grid.</p>
            <div class="language-selection">
                <div class="column">
                    <h4>Grid Language:</h4>
                    <label><input type="radio" name="grid-lang" value="spanish" checked> Spanish</label>
                    <label><input type="radio" name="grid-lang" value="french"> French</label>
                    <label><input type="radio" name="grid-lang" value="english"> English</label>
                </div>
                <div class="column">
                    <h4>Word List Language:</h4>
                    <label><input type="radio" name="list-lang" value="spanish"> Spanish</label>
                    <label><input type="radio" name="list-lang" value="french" checked> French</label>
                    <label><input type="radio" name="list-lang" value="english"> English</label>
                </div>
            </div>
            <p id="direction-note" style="font-size:0.95em; color:#555;">Select grid and word list languages to generate the wordsearch.</p>
        </div>
        <div class="wordsearch-section">
            <div id="grid"></div>
            <div id="word-list"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
